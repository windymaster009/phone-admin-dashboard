name: Full-stack CI

on:
  push:
    branches: [main, feature/fullstack-backend]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint and syntax checks
        run: npm run lint

      - name: Build frontend
        run: npm run build
